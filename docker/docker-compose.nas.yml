services:
  agent-toolchain:
    image: luowenqiang/ai-coding-tools:latest
    container_name: agent-toolchain
    restart: unless-stopped
    env_file:
      - /share/Container/ai-workspace/.env
    environment:
      # 启动模式: interactive（首次交互引导） / auto（读取 .env 自动初始化） / skip / reset
      - INIT_MODE=${INIT_MODE:-auto}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - LANGGRAPH_PORT=${LANGGRAPH_PORT:-8000}
      - OPENCODE_PORT=${OPENCODE_PORT:-4096}
      - OPENCODE_HOSTNAME=0.0.0.0
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - OPENCODE_SKIP_PERMISSIONS=${OPENCODE_SKIP_PERMISSIONS:-true}
      - LANGGRAPH_PERSISTENCE=${LANGGRAPH_PERSISTENCE:-true}
      - LANGGRAPH_CHECKPOINT_PATH=${LANGGRAPH_CHECKPOINT_PATH:-/data/langgraph/checkpoints.sqlite}
      # LLM 提供商与模型配置（自动初始化时必须）
      - PROVIDER_NAME=${PROVIDER_NAME:-}
      - PROVIDER_BASE_URL=${PROVIDER_BASE_URL:-}
      - PROVIDER_API_TYPE=${PROVIDER_API_TYPE:-openai-responses}
      - API_KEY=${API_KEY:-${KIMI_API_KEY:-${DEEPSEEK_API_KEY:-}}}
      - MODEL_ID=${MODEL_ID:-}
      - MODEL_NAME=${MODEL_NAME:-}
      - PRIMARY_MODEL=${PRIMARY_MODEL:-}
      # Kimi Code（Moonshot 出品，api.kimi.com/coding）
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      # DeepSeek（免费额度模型，如 deepseek-v4-flash）
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # OpenCode Zen（OpenCode 官方免费/付费模型网关）
      - OPENCODE_ZEN_API_KEY=${OPENCODE_ZEN_API_KEY:-}
      # OpenCode 模型映射（与 OpenClaw 命名可能不同）
      - OPENCODE_PRIMARY_MODEL=${OPENCODE_PRIMARY_MODEL:-}
      # 角色模型配置（留空则使用 PRIMARY_MODEL）
      - ROLE_PM_MODEL=${ROLE_PM_MODEL:-}
      - ROLE_BUSINESS_ANALYST_MODEL=${ROLE_BUSINESS_ANALYST_MODEL:-}
      - ROLE_ARCHITECT_MODEL=${ROLE_ARCHITECT_MODEL:-}
      - ROLE_API_DESIGNER_MODEL=${ROLE_API_DESIGNER_MODEL:-}
      - ROLE_DATABASE_ENGINEER_MODEL=${ROLE_DATABASE_ENGINEER_MODEL:-}
      - ROLE_TECH_LEAD_MODEL=${ROLE_TECH_LEAD_MODEL:-}
      - ROLE_BACKEND_ENGINEER_MODEL=${ROLE_BACKEND_ENGINEER_MODEL:-}
      - ROLE_FRONTEND_ENGINEER_MODEL=${ROLE_FRONTEND_ENGINEER_MODEL:-}
      - ROLE_DEVOPS_ENGINEER_MODEL=${ROLE_DEVOPS_ENGINEER_MODEL:-}
      - ROLE_CODE_REVIEWER_MODEL=${ROLE_CODE_REVIEWER_MODEL:-}
      - ROLE_SECURITY_ENGINEER_MODEL=${ROLE_SECURITY_ENGINEER_MODEL:-}
      - ROLE_QA_ENGINEER_MODEL=${ROLE_QA_ENGINEER_MODEL:-}
      - ROLE_TECHNICAL_WRITER_MODEL=${ROLE_TECHNICAL_WRITER_MODEL:-}
      - ROLE_PROJECT_MANAGER_MODEL=${ROLE_PROJECT_MANAGER_MODEL:-}
      # 可选节点开关
      - ENABLE_SECURITY_REVIEW=${ENABLE_SECURITY_REVIEW:-false}
      - ENABLE_API_REVIEW=${ENABLE_API_REVIEW:-false}
      # 可选的其他 API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      # 模型层级与额度耗尽切换
      - MODEL_TIERS=${MODEL_TIERS:-}
      - MODEL_TIER_NAMES=${MODEL_TIER_NAMES:-}
      - MODEL_STATE_FILE=${MODEL_STATE_FILE:-/data/langgraph/model_state.json}
      # 可选：OpenClaw Gateway Token（留空则自动生成）
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      # 可选：消息渠道
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_VERIFICATION_TOKEN=${FEISHU_VERIFICATION_TOKEN:-}
      - FEISHU_NOTIFY_WEBHOOK=${FEISHU_NOTIFY_WEBHOOK:-}
      - FEISHU_NOTIFY_SECRET=${FEISHU_NOTIFY_SECRET:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      # 持久化配置、状态、记忆、日志
      - /share/Container/ai-workspace/data/openclaw:/data/openclaw
      - /share/Container/ai-workspace/data/opencode:/data/opencode
      - /share/Container/ai-workspace/data/langgraph:/data/langgraph
      - /share/Container/ai-workspace/data/memory:/data/memory
      - /share/Container/ai-workspace/data/logs:/data/logs
      # 业务数据目录（可按需在 .env 中通过变量覆盖）
      - ${PHOTOS_DIR:-/share/Container/ai-workspace/data/photos}:/data/photos:rw
      - ${CODE_DIR:-/share/Container/ai-workspace/data/code}:/data/code:rw
      - ${KNOWLEDGE_DIR:-/share/Container/ai-workspace/data/knowledge}:/data/knowledge:rw
    ports:
      # OpenClaw Gateway 绑定所有接口以接收渠道 Webhook
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"
      # LangGraph / OpenCode 放开外部访问（NAS 上不能限制 127.0.0.1）
      - "${LANGGRAPH_PORT:-8000}:${LANGGRAPH_PORT:-8000}"
      - "${OPENCODE_PORT:-4096}:${OPENCODE_PORT:-4096}"
    mem_limit: 6g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}/health >/dev/null && curl -sf http://127.0.0.1:${LANGGRAPH_PORT:-8000}/info >/dev/null && curl -sf http://127.0.0.1:${OPENCODE_PORT:-4096}/global/health >/dev/null"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
